# =============================================================================
# redis.conf — Redis 7 configuration
#
# Baked into the Redis image (see the redis stage in the Dockerfile).
# The password is NOT stored here. At startup the secure entrypoint reads
# REDIS_PASSWORD from the environment and writes `requirepass` into a 0600
# config file on tmpfs, keeping the secret out of version control, the image,
# and the process list.
#
# NOTE: Redis does NOT support inline comments after a directive value, so
# every comment must live on its own line.
# =============================================================================

# ---------------------------------------------------------------------------
# Networking
# ---------------------------------------------------------------------------
# Bind only to the internal Docker network interface (0.0.0.0 is fine because
# the container is on an isolated `internal` network with no external access).
bind 0.0.0.0
port 6379
# Requires AUTH once a password is set
protected-mode yes

# ---------------------------------------------------------------------------
# Persistence — AOF (Append Only File) for durability
# AOF persists every write command so data loss is bounded to ~1 second.
# ---------------------------------------------------------------------------
appendonly yes
appendfilename "appendonly.aof"
# everysec balances durability and performance
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ---------------------------------------------------------------------------
# RDB snapshotting — secondary backup in addition to AOF
# save <seconds> <changed-keys>
# ---------------------------------------------------------------------------
save 900 1
save 300 10
save 60 10000

rdbchecksum yes
rdbcompression yes
dbfilename dump.rdb
dir /data

# ---------------------------------------------------------------------------
# Memory management
# ---------------------------------------------------------------------------
# Leave headroom inside the 128 MB container limit
maxmemory 96mb
# Evict least-recently-used keys when the limit is hit
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ---------------------------------------------------------------------------
# Performance
# ---------------------------------------------------------------------------
tcp-keepalive 300
timeout 0
tcp-backlog 511

# ---------------------------------------------------------------------------
# Disable slow/dangerous commands that can block the event loop in production
# ---------------------------------------------------------------------------
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command SHUTDOWN ""

# ---------------------------------------------------------------------------
# Logging — output goes to stdout (captured by Docker)
# ---------------------------------------------------------------------------
loglevel notice
logfile ""

# ---------------------------------------------------------------------------
# Runtime secrets — `requirepass` is written here by the secure entrypoint
# before startup. Kept last so it overrides any earlier directive. The file
# always exists at boot because the entrypoint creates it before redis runs.
# ---------------------------------------------------------------------------
include /tmp/redis-runtime.conf
