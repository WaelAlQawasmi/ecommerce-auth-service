; =============================================================================
; PHP-FPM pool configuration — www pool
; Overrides the default www.conf shipped inside the official image.
; =============================================================================

[www]

; Run worker processes as the same user that owns the application files.
user  = www-data
group = www-data

; Listen on TCP (not Unix socket) so Nginx in a separate container can reach FPM
listen = 0.0.0.0:9000

; ---------------------------------------------------------------------------
; Process management — dynamic mode balances idle resource use with burst capacity
; ---------------------------------------------------------------------------
pm                      = dynamic
pm.max_children         = 20        ; hard upper limit (tune to available RAM ÷ ~25 MB per worker)
pm.start_servers        = 5         ; warm pool on startup
pm.min_spare_servers    = 2
pm.max_spare_servers    = 8
pm.max_requests         = 500       ; recycle workers after N requests to prevent memory leaks

; Log slow requests (> 5 s) for profiling
request_slowlog_timeout = 5s
slowlog                 = /proc/self/fd/2

; Abort requests that take longer than 60 s
request_terminate_timeout = 60s

; ---------------------------------------------------------------------------
; Environment — pass Docker env-vars into the PHP worker processes
; ---------------------------------------------------------------------------
clear_env = no

; ---------------------------------------------------------------------------
; Status / ping endpoints — useful for health checks and dashboards
; ---------------------------------------------------------------------------
pm.status_path  = /fpm-status
ping.path       = /fpm-ping
ping.response   = pong

; ---------------------------------------------------------------------------
; Logging — route to stderr so Docker captures it
; ---------------------------------------------------------------------------
catch_workers_output       = yes
decorate_workers_output    = no
php_admin_value[error_log] = /proc/self/fd/2
