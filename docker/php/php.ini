; =============================================================================
; PHP Runtime configuration — production hardened
; Applied on top of the official php.ini-production baseline.
; =============================================================================

; ---------------------------------------------------------------------------
; Error reporting — never expose errors to end-users in production
; ---------------------------------------------------------------------------
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /proc/self/fd/2    ; stderr → Docker log driver
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ---------------------------------------------------------------------------
; Limits
; ---------------------------------------------------------------------------
memory_limit           = 256M
max_execution_time     = 60
max_input_time         = 60
post_max_size          = 20M
upload_max_filesize    = 20M
max_file_uploads       = 10

; ---------------------------------------------------------------------------
; Security
; ---------------------------------------------------------------------------
; Hides the PHP version from HTTP response headers
expose_php             = Off

; Restrict file operations to the application root
open_basedir           = /var/www/html:/tmp

; Disable dangerous web-RCE vectors not needed in a Laravel API service.
; NOTE: proc_open and the pcntl_* signal/fork functions are intentionally NOT
; disabled — queue:work relies on pcntl_signal/pcntl_async_signals/pcntl_alarm
; for graceful shutdown and --max-time, and the scheduler shells out via
; Symfony Process (proc_open).
disable_functions      = exec,passthru,shell_exec,system,popen,\
                         parse_ini_file,show_source,phpinfo,\
                         pcntl_exec

; ---------------------------------------------------------------------------
; Session hardening
; ---------------------------------------------------------------------------
session.cookie_secure   = On
session.cookie_httponly = On
session.cookie_samesite = Lax
session.use_strict_mode = On
session.gc_maxlifetime  = 7200

; ---------------------------------------------------------------------------
; Date / timezone
; ---------------------------------------------------------------------------
date.timezone = UTC

; ---------------------------------------------------------------------------
; Realpath cache — avoids repeated stat() calls on deeply nested autoloaded files
; ---------------------------------------------------------------------------
realpath_cache_size = 4096k
realpath_cache_ttl  = 600
