; =============================================================================
; OPcache configuration — maximises PHP bytecode cache hit rate
; =============================================================================

; Enable OPcache (required — disabled by default in some builds)
opcache.enable                  = 1
opcache.enable_cli              = 0

; Memory allocated to store precompiled bytecode
; 256 MB is appropriate for a medium-sized Laravel application.
opcache.memory_consumption      = 256

; Maximum number of files that can be cached.
; Use `find /var/www/html -name "*.php" | wc -l` to size this correctly.
opcache.max_accelerated_files   = 20000

; Interned strings buffer (shared between processes)
opcache.interned_strings_buffer = 16

; ---------------------------------------------------------------------------
; Production: disable timestamp validation for maximum performance.
; Files are only recompiled when the container is rebuilt.
; IMPORTANT: Set to 1 during local development or CI so code changes take effect.
; ---------------------------------------------------------------------------
opcache.validate_timestamps     = 0
opcache.revalidate_freq         = 0

; Enables JIT compilation (PHP 8+).
; `tracing` mode offers the best throughput for long-running FPM workers.
; Set to `disable` if you observe instability or use Xdebug.
opcache.jit                     = tracing
opcache.jit_buffer_size         = 64M

; Saves the precompiled state to disk so it survives a PHP-FPM reload.
opcache.file_cache              = /tmp/opcache
opcache.file_cache_consistency_checks = 0

; Class/function preloading (optional). Both directives must be enabled
; together — setting opcache.preload_user without opcache.preload emits a
; startup warning, so they are kept commented until a preload script exists.
; opcache.preload               = /var/www/html/config/opcache-preload.php
; opcache.preload_user          = www-data
