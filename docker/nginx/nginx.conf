# =============================================================================
# nginx.conf — global Nginx configuration
#
# The official nginx:alpine image ships a reasonable default nginx.conf that
# already includes /etc/nginx/conf.d/*.conf.  We replace it here to have
# explicit control over every tunable.
# =============================================================================

# Run as the default unprivileged user created by the official image
user  nginx;

# Let Nginx automatically match the number of available CPU cores
worker_processes  auto;

# Path to the PID file (must be writable by the nginx user)
pid /var/run/nginx.pid;

# Increase the open file descriptor limit per worker
worker_rlimit_nofile 65535;

# ---------------------------------------------------------------------------
# Error log → stderr so Docker captures it natively
# ---------------------------------------------------------------------------
error_log /dev/stderr warn;

# =============================================================================
events {
    # Maximum simultaneous connections per worker process.
    # Formula: worker_processes × worker_connections = total concurrency.
    worker_connections 4096;

    # Accept as many connections as possible in one epoll wake-up
    multi_accept on;

    # epoll is the most efficient I/O event mechanism on Linux
    use epoll;
}

# =============================================================================
http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------------------------------------------------------------------------
    # Access log format — JSON structured log for easy parsing by log aggregators
    # ---------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /dev/stdout json_combined;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile            on;    # zero-copy file transfers
    tcp_nopush          on;    # batch response headers + first data chunk
    tcp_nodelay         on;    # disable Nagle for low-latency responses

    keepalive_timeout   30;
    keepalive_requests  1000;

    # Limit the size of the client request body (file uploads, JSON payloads)
    client_max_body_size       20M;
    client_body_buffer_size    128k;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;

    # ---------------------------------------------------------------------------
    # Gzip compression — reduces payload size for text-based assets
    # ---------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;       # good balance between CPU and compression ratio
    gzip_min_length   256;     # don't bother compressing tiny responses
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ---------------------------------------------------------------------------
    # Hide server version from response headers
    # ---------------------------------------------------------------------------
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Rate limiting zones (apply per-IP to individual location blocks)
    # ---------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=api:10m    rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=auth:10m   rate=10r/m;
    limit_conn_zone $binary_remote_addr  zone=perip:10m;

    # ---------------------------------------------------------------------------
    # Include server-block configurations
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
