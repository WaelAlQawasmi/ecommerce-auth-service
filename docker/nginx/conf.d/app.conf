# =============================================================================
# app.conf — server block for the Laravel application
#
# This file contains ONLY a `server {}` block (and the upstream directive).
# Global directives (worker_processes, events, http-level gzip, etc.) live
# in nginx.conf — never here.
# =============================================================================

# ---------------------------------------------------------------------------
# PHP-FPM upstream — use Docker embedded DNS (127.0.0.11) so nginx starts even
# when the app container is not yet on the network (resolved per request).
# ---------------------------------------------------------------------------
resolver 127.0.0.11 valid=10s ipv6=off;

# ---------------------------------------------------------------------------
# Main application server
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    root  /var/www/html/public;
    index index.php;

    charset utf-8;

    # Resolved at request time via $php_fpm (see location ~ \.php$ below).
    set $php_fpm app:9000;

    # -------------------------------------------------------------------------
    # Connection limits (uses the zone defined in nginx.conf)
    # -------------------------------------------------------------------------
    limit_conn perip 20;

    # -------------------------------------------------------------------------
    # Security headers
    # Applied to every response from this server block.
    # -------------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # Adjust CSP to match your frontend's actual requirements (/docs/ uses $csp_header map)
    add_header Content-Security-Policy $csp_header always;

    # -------------------------------------------------------------------------
    # Health check — fast 200 for load balancer / Docker HEALTHCHECK
    # -------------------------------------------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # -------------------------------------------------------------------------
    # Block access to all hidden files (e.g. .env, .git, .htaccess)
    # Exemption: /.well-known/ for ACME / Let's Encrypt challenges
    # -------------------------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # -------------------------------------------------------------------------
    # Block common exploit paths
    # -------------------------------------------------------------------------
    location ~* (composer\.(json|lock)|package\.json|webpack\.config\.js|artisan)$ {
        deny all;
        return 404;
    }

    # -------------------------------------------------------------------------
    # Laravel routing — try files then fall back to index.php
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------------------------
    # PHP handler — forward .php requests to PHP-FPM
    # -------------------------------------------------------------------------
    location ~ \.php$ {
        # Prevent executing PHP files uploaded to storage
        # (only the document root entry point should be executable)
        try_files $uri =404;

        include       fastcgi_params;
        fastcgi_pass  $php_fpm;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param SERVER_NAME     $host;

        # Timeouts — align with PHP max_execution_time
        fastcgi_connect_timeout  10s;
        fastcgi_send_timeout     60s;
        fastcgi_read_timeout     60s;

        # Buffers — large enough for typical Laravel JSON API responses
        fastcgi_buffer_size   256k;
        fastcgi_buffers       8 256k;
        fastcgi_busy_buffers_size 512k;

        fastcgi_intercept_errors on;
    }

    # -------------------------------------------------------------------------
    # API rate limiting
    # -------------------------------------------------------------------------
    location ^~ /api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------------------------
    # Auth rate limiting (stricter — prevents credential stuffing)
    # -------------------------------------------------------------------------
    location ~* ^/api/v1/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------------------------
    # Static asset caching
    # `immutable` tells browsers never to revalidate before the max-age expires.
    # Versioned filenames (e.g. app.abc123.js) make this safe.
    # -------------------------------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        expires     1y;
        access_log  off;
        add_header  Cache-Control "public, immutable";
        add_header  X-Content-Type-Options "nosniff" always;
    }
}